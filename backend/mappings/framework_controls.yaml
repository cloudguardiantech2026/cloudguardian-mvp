controls:
  CE_1_2:
    name: "Multi-Factor Authentication"
    logic: "ALL"
    requires:
      - ROOT_MFA_DISABLED
    severity: "HIGH"
    weight: 35
    plain_english_fail: "Multi-Factor Authentication is not fully enforced."
    risk: "Without MFA, a compromised password could allow unauthorized administrative access."
    recommendation: "Enable MFA for the AWS root account and any privileged users."

  CE_2_1:
    name: "Secure Configuration"
    logic: "ANY_FAIL"
    requires:
      - S3_PUBLIC
    severity: "HIGH"
    weight: 35
    plain_english_fail: "One or more storage resources are publicly accessible."
    risk: "Sensitive business data may be exposed to the internet."
    recommendation: "Disable public access on S3 buckets and enable Block Public Access settings."

  CE_3_1:
    name: "Boundary Firewalls and Internet Gateways"
    logic: "ANY_FAIL"
    requires:
      - SG_SSH_OPEN
      - SG_RDP_OPEN
      - SG_MYSQL_OPEN
      - SG_POSTGRES_OPEN
    severity: "MEDIUM"
    weight: 30
    plain_english_fail: "One or more critical network ports are exposed to the internet."
    risk: "Unrestricted inbound access increases the chance of brute-force attacks or unauthorized access."
    recommendation: "Restrict security group access so critical ports are not open to 0.0.0.0/0."
